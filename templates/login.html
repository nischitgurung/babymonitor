{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-4">

<div class="card shadow">

<div class="card-body">

<h3 class="text-center mb-4">

Login

</h3>

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<input
type="text"
name="username"
class="form-control"
placeholder="Username">

</div>

<div class="mb-3">

<input
type="password"
name="password"
class="form-control"
placeholder="Password">

</div>

<button
class="btn btn-primary w-100">

Login

</button>

</form>

<hr>

<a href="{% url 'register' %}">

Create Account

</a>

</div>

</div>

</div>

</div>

</div>

{% endblock %}
