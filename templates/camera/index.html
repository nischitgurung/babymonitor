<!DOCTYPE html>
<html>
<head>
    <title>Camera - Baby Monitor</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background: #f4f4f4; }
        video { max-width: 100%; border: 4px solid #4CAF50; border-radius: 12px; }
        #status { padding: 12px; margin: 15px auto; max-width: 600px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>📹 Baby Camera</h2>
    <div id="status">Initializing...</div>
    <video id="localVideo" autoplay playsinline muted></video>
    <br><br>
    <button onclick="stopCamera()">Stop Camera</button>

<script>
const room = "{{ room.room_code }}";
let localStream = null;
let peer = null;

const config = {
    iceServers: [
        { urls: "stun:stun.l.google.com:19302" },
        { urls: "stun:stun1.l.google.com:19302" }
    ]
};

async function startCamera() {
    const statusEl = document.getElementById("status");
    statusEl.textContent = "Requesting camera...";

    try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        document.getElementById("localVideo").srcObject = localStream;

        peer = new RTCPeerConnection(config);

        localStream.getTracks().forEach(track => peer.addTrack(track, localStream));

        peer.onicecandidate = async (event) => {
            if (event.candidate) {
                await fetch("/signal/signal/", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ room, candidate: event.candidate, side: "camera" })
                });
            }
        };

        const offer = await peer.createOffer();
        await peer.setLocalDescription(offer);

        await fetch("/signal/signal/", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ room, offer: peer.localDescription })
        });

        console.log("✅ Offer sent to signaling server");
        statusEl.textContent = "✅ Camera Live - Waiting for Parent";

        waitForAnswer();

    } catch (err) {
        console.error(err);
        statusEl.textContent = "❌ " + err.message;
    }
}

async function waitForAnswer() {
    setInterval(async () => {
        const res = await fetch(`/signal/answer/${room}/`);
        const data = await res.json();
        if (data.answer && peer) {
            await peer.setRemoteDescription(new RTCSessionDescription(data.answer));
            console.log("✅ Connection Established!");
        }
    }, 1000);
}

function stopCamera() {
    if (localStream) localStream.getTracks().forEach(t => t.stop());
}

window.onload = startCamera;
</script>
</body>
</html>
