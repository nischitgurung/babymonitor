{% extends "layouts/dashboard.html" %}

{% block content %}

<div class="container">
    <div class="card p-4 shadow">
        <h2>Create Monitoring Room</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Room Name</label>
                <input
                    type="text"
                    class="form-control"
                    name="room_name"
                    placeholder="Baby Room"
                    required>
            </div>

            <button class="btn btn-primary">
                Create Room
            </button>
        </form>
    </div>
</div>

{% endblock %}
